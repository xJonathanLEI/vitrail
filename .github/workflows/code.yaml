on:
  push:
    branches:
      - "master"
  pull_request:

name: "Code checks"

jobs:
  rustfmt:
    name: "Check code format"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v6"

      - name: "Setup toolchain"
        uses: "actions-rs/toolchain@v1"
        with:
          toolchain: "stable"
          components: "clippy"
          override: true

      - name: "Check Rust format"
        run: |
          cargo fmt --all -- --check

  clippy:
    name: "Run Clippy"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v6"

      - name: "Setup toolchain"
        uses: "actions-rs/toolchain@v1"
        with:
          toolchain: "stable"
          components: "clippy"
          override: true

      - name: "Use Rust cache"
        uses: "Swatinem/rust-cache@v2"
        with:
          cache-on-failure: true

      - name: "Run Clippy"
        run: |
          cargo clippy --all --all-targets -- -D warnings

  biome:
    name: "Check script format"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: "Install dependencies"
        run: |
          npm ci

      - name: "Run Biome format check"
        run: |
          npm run format:check

  prisma-fixtures:
    name: "Generate Prisma fixtures"
    runs-on: "ubuntu-latest"
    services:
      postgres:
        image: "postgres:16-alpine"
        env:
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "postgres"
          POSTGRES_DB: "vitrail"
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d vitrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: "Install Prisma CLI"
        run: |
          npm ci

      - name: "Generate Prisma fixtures"
        env:
          VITRAIL_POSTGRES_URL: "postgres://postgres:postgres@127.0.0.1:5432/vitrail"
        run: |
          npm run generate:prisma-fixtures

      - name: "Check generated fixture diff"
        run: |
          git diff --exit-code

  test:
    name: "Run tests"
    runs-on: "ubuntu-latest"
    services:
      postgres:
        image: "postgres:16-alpine"
        env:
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "postgres"
          POSTGRES_DB: "vitrail"
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d vitrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v6"

      - name: "Setup toolchain"
        uses: "actions-rs/toolchain@v1"
        with:
          toolchain: "stable"
          components: "clippy"
          override: true

      - name: "Use Rust cache"
        uses: "Swatinem/rust-cache@v2"
        with:
          cache-on-failure: true

      - name: "Install nexttest"
        uses: "taiki-e/install-action@nextest"

      - name: "Run tests"
        env:
          CARGO_TERM_COLOR: "always"
          VITRAIL_POSTGRES_URL: "postgres://postgres:postgres@127.0.0.1:5432/vitrail"
        run: |
          cargo nextest run
